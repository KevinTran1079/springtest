openapi: 3.0.3
info:
  title: Hello API
  version: 1.0.0
  description: Minimal contract-first example for a Spring Boot endpoint.
paths:
  /api/hello:
    get:
      operationId: getHello
      summary: Return a basic greeting
      responses:
        '200':
          description: Plain-text hello response
          content:
            text/plain:
              schema:
                type: string
                example: Hello World
